    id: ToViewResultAsync
    path: ../Helpers/ViewResultHelper.cs
    startLine: 35
  assemblies:
  - KYS.AspNetCore.Library
  namespace: KYS.AspNetCore.Library.Helpers
  summary: >-
    Read <code>HttpResponseMessage</code> and render it to a <code>ViewResult</code>.

    <br /><br />

    Idea from <a href="https://stackoverflow.com/questions/79674066/how-to-convert-httpresponsemessage-to-viewresult/79674130#79674130">How to convert HttpResponseMessage to ViewResult?</a>
  remarks: >-
    This method automatically handles:

    <ul><li>Checking <xref href="System.Net.Http.HttpResponseMessage.IsSuccessStatusCode" data-throw-if-not-resolved="false"></xref>.</li><li>Asynchronous reading of the response content.</li><li>Deserialization of JSON content into type <code class="typeparamref">T</code>.</li><li>Mapping API status codes and reason phrases to the view model.</li></ul>
  example: []
  syntax:
    content: public static Task<ViewResult> ToViewResultAsync<T>(HttpContext httpContext, HttpResponseMessage response, string viewName, string errorViewName = "/Views/Shared/Error.cshtml")
    parameters:
    - id: httpContext
      type: Microsoft.AspNetCore.Http.HttpContext
      description: The current HTTP context, used to initialize the ViewDataDictionary.
    - id: response
      type: System.Net.Http.HttpResponseMessage
      description: The raw response received from an API call.
    - id: viewName
      type: System.String
      description: The name or path of the view to render on a successful API response.
    - id: errorViewName
      type: System.String
      description: The name or path of the view to render if the API returns a non-success status code. Defaults to the Shared Error view.
    typeParameters:
    - id: T
      description: The expected model type to be deserialized from the response body.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ViewResult}
      description: A <xref href="Microsoft.AspNetCore.Mvc.ViewResult" data-throw-if-not-resolved="false"></xref> containing an <xref href="KYS.AspNetCore.Library.Models.ApiReponseModel%601" data-throw-if-not-resolved="false"></xref> as its model.
    content.vb: Public Shared Function ToViewResultAsync(Of T)(httpContext As HttpContext, response As HttpResponseMessage, viewName As String, errorViewName As String = "/Views/Shared/Error.cshtml") As Task(Of ViewResult)
  overload: KYS.AspNetCore.Library.Helpers.ViewResultHelper.ToViewResultAsync*
