  namespace: KYS.Library.Helpers
  summary: >-
    Flatten the object into a key-value pair with the key based on the <code>flattenFormat</code> given. 

    <br />

    Default key format: <xref href="KYS.Library.Helpers.JsonHelper.FlattenFormat.JsonPath" data-throw-if-not-resolved="false"></xref>.

    <br />

    <br />

    Reference: <a href="https://stackoverflow.com/a/63487391">Generically Flatten Json using c#</a>
  example: []
  syntax:
    content: 'public static Result<Dictionary<string, object>> FlattenObject<T>(T source, JsonHelper.FlattenFormat flattenFormat = FlattenFormat.JsonPath) where T : class, new()'
    parameters:
    - id: source
      type: '{T}'
      description: The provided value to be flatten.
    - id: flattenFormat
      type: KYS.Library.Helpers.JsonHelper.FlattenFormat
      description: The <xref href="KYS.Library.Helpers.JsonHelper.FlattenFormat" data-throw-if-not-resolved="false"></xref> format to construct the key.
    typeParameters:
    - id: T
      description: The type of <code>source</code>. Must be a reference type with a public parameterless constructor.
    return:
      type: CSharpFunctionalExtensions.Result{System.Collections.Generic.Dictionary{System.String,System.Object}}
      description: A <xref href="CSharpFunctionalExtensions.Result%601" data-throw-if-not-resolved="false"></xref> containing the key value pair for the flatten JSON.
    content.vb: Public Shared Function FlattenObject(Of T As {Class, New})(source As T, flattenFormat As JsonHelper.FlattenFormat = FlattenFormat.JsonPath) As Result(Of Dictionary(Of String, Object))
