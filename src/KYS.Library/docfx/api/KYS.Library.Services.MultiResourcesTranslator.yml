  assemblies:
  - KYS.Library
  namespace: KYS.Library.Services
  summary: Loads the languages and their resources from the assembly. The method iterates through the available cultures and resource files, attempting to load the resources for each culture. If a resource file is not found for a culture, it safely ignores the exception and continues loading other resources. If any other exception occurs during loading, it returns a failure result with the error message.
  example: []
  syntax:
    content: protected override Result<List<LanguageResources>> LoadLanguages()
    return:
      type: CSharpFunctionalExtensions.Result{System.Collections.Generic.List{KYS.Library.Services.LanguageResources}}
      description: A <xref href="CSharpFunctionalExtensions.Result%601" data-throw-if-not-resolved="false"></xref> containing the loaded language resources.
