  assemblies:
  - KYS.Library
  namespace: KYS.Library.Services
  summary: Translate to selected language for provided <code>cultureName</code>. By default, translate to current/initialized language.
  example: []
  syntax:
    content: Result<string> Translate(string input, CultureInfo culture = null)
    parameters:
    - id: input
      type: System.String
      description: A key for the resource.
    - id: culture
      type: System.Globalization.CultureInfo
      description: The culture chosen for the translation. By default, uses the current culture if it is not provided.
    return:
      type: CSharpFunctionalExtensions.Result{System.String}
      description: A <xref href="CSharpFunctionalExtensions.Result%601" data-throw-if-not-resolved="false"></xref> containing the translated text.
    content.vb: Function Translate(input As String, culture As CultureInfo = Nothing) As Result(Of String)
