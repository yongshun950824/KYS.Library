    startLine: 24
  assemblies:
  - KYS.Library
  namespace: KYS.Library.Services
  summary: Translate to selected language for <b>specified resource</b> and provided <code>culture</code>. By default, translate to current/initialized language.
  example: []
  syntax:
    content: Result<string> Translate(string input, Type resourceType, CultureInfo culture = null)
    parameters:
    - id: input
      type: System.String
      description: A key for the resource.
    - id: resourceType
      type: System.Type
      description: The resource file to be used.
    - id: culture
      type: System.Globalization.CultureInfo
      description: The culture chosen for the translation. By default, uses the current culture if it is not provided.
    return:
      type: CSharpFunctionalExtensions.Result{System.String}
      description: A <xref href="CSharpFunctionalExtensions.Result%601" data-throw-if-not-resolved="false"></xref> containing the translated English text.
    content.vb: Function Translate(input As String, resourceType As Type, culture As CultureInfo = Nothing) As Result(Of String)
