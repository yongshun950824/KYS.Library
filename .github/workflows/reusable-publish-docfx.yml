name: Reusable Publish DocFxx

on:
  workflow_call:
    inputs:
      library-name:
        required: true
        type: string
      docfx-project:
        required: true
        type: string
      docfx-publish-dir:
        required: true
        type: string
      dotnet-version:
        required: false
        type: string
        default: "8.0.x"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      LIBRARY_NAME: ${{ inputs.library-name }}
      DOCFX_PROJECT: ${{ inputs.docfx-project }}
      DOCFX_PUBLISH_DIR: ${{ inputs.docfx-publish-dir }}
      DOTNET_VERSION: ${{ inputs.dotnet-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build Documentation
        working-directory: ${{ env.DOCFX_PROJECT }}
        run: |
          docfx metadata
          docfx build

      # peaceiris/actions-gh-pages@v4.0.0
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          github_token: ${{ env.GITHUB_TOKEN }}
          publish_dir: ${{ env.DOCFX_PUBLISH_DIR }}
          destination_dir: ${{ env.LIBRARY_NAME }}
