name: CI - Build KYS.EFCore Library
permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - master
    paths:
      - "src/KYS.EFCore.Library/**"
      - "src/KYS.Library/**"
  pull_request:
    branches:
      - master
    paths:
      - "src/KYS.EFCore.Library/**"
      - "src/KYS.Library/**"

jobs:
  build:
    uses: ./.github/workflows/reusable-dotnet-build.yml
    with: 
      library-name: 'KYS.EFCore Library'
      library-project-path: 'src/KYS.EFCore.Library/KYS.EFCore.Library.csproj'
      library-tests-project-path:
      dotnet-version: '8.0.x'
