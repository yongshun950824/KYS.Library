name: Build and Publish KYS.Library DocFX
permissions:
  contents: write

on:
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - master
    paths:
      - "src/KYS.Library/**"

jobs:
  build-docs:
    uses: ./.github/workflows/reusable-publish-docfx.yml
    with:
      library-name: kys-library
      docfx-project: src/KYS.Library/docfx
      docfx-publish-dir: ./src/KYS.Library/docfx/_site
      dotnet-version:
    permissions:
      contents: write
